<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonte Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('myheart.otf') format('opentype'), url('myheart.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
            Tipo de format()
            - opentype(otf)
            - truetype()ttf
            - embedded-opentype
            - truetype-aat
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
        p { 
            font-family: 'Love' ;
            font-size: 2em;
            font-weight: normal;
    
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Enim inventore corrupti sit qui eum architecto ut, placeat, ea nostrum dolores assumenda, reprehenderit porro earum ex aut laborum! Error, temporibus iste!</p>
</body>
</html>
