<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>
    <video width="560" controls autolay loop>
        <source src="midias/15338353 1920 1080 30Fps.mp4" type="video/mp4" >
        <source src="midias/15338353 1920 1080 30Fps.webm" type="video/webm">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeo</p>
    </video>
     
<h1>Inserindo vídeos do Youtube</h1>
<p>Este vídeo está hospedado no Youtube</p>
<iframe width="560" height="315" src="https://www.youtube.com/embed/2iaPuUFIyMo?si=f39jXj18kDJqw-NT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
